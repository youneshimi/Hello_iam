<!-- start contact -->
<section class="contact pt-5 pb-5" id="contact">
    <div class="container">
        <div class="shape-1">
            <img src="images/testi/shape.png" alt="" class="img-fluid">
        </div>
        <div class="contact-item">
            <div class="row align-items-center">
                <div class="col-lg-5">
                    <div class="contact-info">
                        <div class="mb-4">
                            <h3 class="section-heading-line">Let's Connect</h3>
                        </div>
                        <hr>
                        <div class="info-content mt-4" data-reveal="left" data-delay="100">
                            <h6>Address :</h6>
                            <div class="d-flex">
                                <div class="icon">
                                    <i class="mdi mdi-home-outline fs-24 text-primary"></i>
                                </div>
                                <div class="icon-content ms-3">
                                    <p class="mb-0 fs-15">Corte, Corse<br> France</p>
                                </div>
                            </div>
                        </div>
                        <div class="info-content mt-4 pt-2" data-reveal="left" data-delay="200">
                            <h6>Phone :</h6>
                            <div class="d-flex">
                                <div class="icon">
                                    <i class="mdi mdi-phone-outline fs-24 text-primary"></i>
                                </div>
                                <div class="icon-content ms-3">
                                    <p class="mb-0 fs-15">(+33) 644711719</p>
                                </div>
                            </div>
                        </div>
                        <div class="info-content mt-4 pt-2" data-reveal="left" data-delay="300">
                            <h6>Email :</h6>
                            <div class="d-flex">
                                <div class="icon">
                                    <i class="mdi mdi-email-outline fs-24 text-primary"></i>
                                </div>
                                <div class="icon-content ms-3">
                                    <p class="mb-0 fs-15">y.shimiyounes@gmail.com</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="custom-form mt-4">
                        <form action="mailto:y.shimiyounes@gmail.com" method="post" enctype="text/plain">
                            <h6 class="mb-0 text-muted">Let's talk</h6>
                            <p id="error-msg" style="opacity: 1;"></p>
                            <div id="simple-msg"></div>
                            <div class="row">
                                <div class="col-lg-6">
                                    <div class="form-group">
                                        <input name="name" id="name" type="text" class="form-control contact-form"
                                            placeholder="Your name" required minlength="2">
                                    </div>
                                </div>
                                <div class="col-lg-6">
                                    <div class="form-group">
                                        <input name="email" id="email" type="email" class="form-control contact-form"
                                            placeholder="Your email" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-lg-12">
                                    <div class="form-group mt-2">
                                        <input type="text" class="form-control contact-form" id="subject" name="subject"
                                            placeholder="Your Subject.." required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-lg-12">
                                    <div class="form-group mt-2">
                                        <textarea name="comments" id="comments" rows="4"
                                            class="form-control contact-form h-auto" placeholder="Your message..."
                                            required minlength="10"></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="row my-2">
                                <div class="col-lg-12 d-grid">
                                    <input type="submit" id="submit" class="submitBnt btn btn-rounded btn-primary"
                                        value="Send Message ✈">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="shape-2">
            <img src="images/testi/shape-2.png" alt="" class="img-fluid">
        </div>
        <div class="shape-3">
            <img src="images/testi/shape-3.png" alt="" class="img-fluid">
        </div>
    </div>
</section>
<!-- end contact -->
